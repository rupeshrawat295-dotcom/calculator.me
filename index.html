<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyansh Modi Bhakt Poll</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ff8c00;
            margin: 0;
            padding: 0;
            color: white;
        }

        header {
            background: #e65100;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 10px;
        }

        h1, h2 {
            text-align: center;
        }

        .option {
            margin: 15px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: white;
            color: #e65100;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ffe0b2;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #e65100;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Priyansh Modi Bhakt</h1>
    <p>Opinion Poll Website</p>
</header>

<div class="container">
    <h2>Who do you support?</h2>

    <div class="option">
        <button onclick="vote('Narendra Modi')">Narendra Modi</button>
    </div>

    <div class="option">
        <button onclick="vote('Dhruv Rathee')">Dhruv Rathee</button>
    </div>

    <div id="result"></div>
</div>

<footer>
    © 2026 Priyansh Modi Bhakt
</footer>

<script>
function vote(name) {
    document.getElementById("result").innerHTML =
        "You voted for: <b>" + name + "</b>";
}
</script>

</body>
</html>
