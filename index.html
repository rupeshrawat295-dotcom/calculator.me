<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Premium Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#87CEFA,#FFFACD);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.calculator{
    width:320px;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.display{
    width:100%;
    height:60px;
    font-size:28px;
    text-align:right;
    margin-bottom:10px;
    border:none;
    background:#f1f1f1;
    border-radius:10px;
    padding-right:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

.number{background:#e3f2fd;}
.operator{background:#ffd54f;}
.equal{background:#4caf50;color:white;}

#payment{
    display:none;
    text-align:center;
    margin-top:15px;
}

#payment img{
    width:180px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="calculator">
    <input class="display" id="display" readonly>

    <div class="buttons">
        <button class="number" onclick="add('7')">7</button>
        <button class="number" onclick="add('8')">8</button>
        <button class="number" onclick="add('9')">9</button>
        <button class="operator" onclick="add('/')">÷</button>

        <button class="number" onclick="add('4')">4</button>
        <button class="number" onclick="add('5')">5</button>
        <button class="number" onclick="add('6')">6</button>
        <button class="operator" onclick="add('*')">×</button>

        <button class="number" onclick="add('1')">1</button>
        <button class="number" onclick="add('2')">2</button>
        <button class="number" onclick="add('3')">3</button>
        <button class="operator" onclick="add('-')">−</button>

        <button class="number" onclick="add('0')">0</button>
        <button onclick="clearDisplay()">C</button>
        <button class="equal" onclick="showPayment()">=</button>
        <button class="operator" onclick="add('+')">+</button>
    </div>

    <div id="payment">
        <h3>🔒 Pay €10 to reveal answer</h3>

        <!-- Placeholder QR image -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=REPLACE_WITH_YOUR_PAYMENT_LINK"
             alt="QR Code">

        <p>Scan QR to continue</p>
    </div>
</div>

<script>
function add(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
    document.getElementById("payment").style.display = "none";
}

function showPayment(){
    document.getElementById("payment").style.display = "block";
}
</script>

</body>
</html>
